<!DOCTYPE html>
<html>

<head>
	<meta charset="UTF-8">
	<title>Zoho Desk - Apps</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet"
		integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
	<script src="//ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js"></script>
	<script src="//cdnjs.cloudflare.com/ajax/libs/jquery.maskedinput/1.4.1/jquery.maskedinput.min.js"></script>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.3/jquery.min.js"></script>
	<link rel="shortcut icon" href="#">
	<script src="https://unpkg.com/axios/dist/axios.min.js"></script>

</head>

<style>
	.container-sm {
		margin: 0 auto;
	}

	a {
		cursor: pointer;
	}

	p {
		margin: 2px !important;
	}

	.div-btn {
		width: 100%;
		margin-left: 2px;
	}


	#items {
		padding: 20px;
	}

	.flex {
		display: flex;
	}

	.flex2 {
		display: flex;
		justify-content: space-between;
	}

	.espaco {
		margin: 10px 0 10px 0;
	}

	.div-img {
		width: 15%;
	}

	.div-direita {
		text-align: end;
	}

	.div-cem {
		width: 100%;
	}
</style>

<body>

	<div class="container-sm">
		<section class="form-data">
			<div class="container-fluid h-custom">
				<div class="row d-flex justify-content-center align-items-center h-100">
					<div class="col-md-9 col-lg-6 col-xl-5">
						<img src="https://dev-webpeak.sfo3.digitaloceanspaces.com/images/logo-vtex-zohoDesk.png"
							class="rounded img-fluid" alt="Sample image">
					</div>
					<div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
						<form id="form" class="row g-3 needs-validation" method="post" novalidate
							action="produto.html">
							<a href="https://dev-webpeak.sfo3.digitaloceanspaces.com/Tutorial.pdf"
								download="Tutorial.pdf" class="link-dark">Como conseguir os dados de acesso</a>
							<div class="form-outline mb-4">
								<label for="validationCustom01" class="form-label">Nome da Loja</label>
								<input type="text" class="form-control nome-loja" id="validationCustom01" required>
								<div class="valid-feedback">
									Tudo certo!
								</div>
							</div>

							<div class="form-outline mb-4">
								<label for="validationCustom02" class="form-label">X-VTEX-API-AppKey</label>
								<input type="text" class="form-control api-key" id="validationCustom02" required>
								<div class="valid-feedback">
									Tudo certo!
								</div>
							</div>

							<div class="form-outline mb-4">
								<label for="validationCustom03" class="form-label">X-VTEX-API-AppToken</label>
								<input type="text" class="form-control api-token" id="validationCustom03" required>
								<div class="valid-feedback">
									Tudo certo!
								</div>
							</div>

							<div class="col-12">
								<button id="btn-acessa" class="btn btn-primary" type="submit">Entrar</button>
							</div>
						</form>
					</div>
				</div>
			</div>
		</section>
	</div>

	<script src="https://js.zohostatic.com/support/developer_sdk/v1/js/ZohoDeskClientSDK.min.js"></script>
	<script src="./js/script.js" charset="utf-8"></script>
	<script src="./js/extension.js" charset="utf-8"></script>

</body>

</html>
